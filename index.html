<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excel ETL 工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4f6;
      --panel: rgba(255, 255, 255, 0.58);
      --text: #172033;
      --muted: #5f6d80;
      --line: rgba(117, 137, 162, 0.22);
      --brand: #0f8296;
      --brand-dark: #0a5f70;
      --accent: #c86e45;
      --ok: #18794e;
      --warn: #b54708;
      --shadow: 0 22px 60px rgba(23, 32, 51, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.7);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg);
      background:
        linear-gradient(135deg, rgba(226, 244, 246, 0.92), rgba(248, 251, 255, 0.96) 46%, rgba(247, 241, 232, 0.94)),
        linear-gradient(165deg, rgba(15, 130, 150, 0.12), transparent 34%, rgba(200, 110, 69, 0.12));
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(112deg, rgba(255, 255, 255, 0.5), transparent 34%),
        repeating-linear-gradient(120deg, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px 18px);
      mask-image: linear-gradient(to bottom, #000, rgba(0, 0, 0, 0.72));
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.12;
      letter-spacing: 0;
      color: #111827;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px) saturate(145%);
      -webkit-backdrop-filter: blur(24px) saturate(145%);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.14) 44%, rgba(255, 255, 255, 0.36));
      opacity: 0.72;
    }

    .controls {
      padding: 18px;
      position: sticky;
      top: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: relative;
      z-index: 1;
    }

    .field:nth-of-type(1) {
      background: linear-gradient(145deg, rgba(219, 246, 249, 0.62), rgba(255, 255, 255, 0.2));
      border-color: rgba(65, 148, 164, 0.18);
    }

    .field:nth-of-type(2) {
      background: linear-gradient(145deg, rgba(231, 247, 226, 0.62), rgba(255, 255, 255, 0.2));
      border-color: rgba(91, 142, 83, 0.16);
    }

    .field:nth-of-type(3) {
      background: linear-gradient(145deg, rgba(241, 234, 255, 0.66), rgba(255, 247, 232, 0.26));
      border-color: rgba(121, 100, 178, 0.16);
    }

    label {
      color: #2d3b4f;
      font-size: 14px;
      font-weight: 650;
    }

    .filebox {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px dashed rgba(32, 133, 151, 0.34);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
    }

    input[type="file"],
    select {
      width: 100%;
      border: 1px solid rgba(86, 139, 93, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.72), rgba(238, 250, 235, 0.42)),
        rgba(255, 255, 255, 0.58);
      color: var(--text);
      padding: 10px 11px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75), 0 8px 24px rgba(23, 32, 51, 0.05);
    }

    input[type="file"]:focus-visible,
    select:focus-visible,
    button:focus-visible {
      outline: 3px solid rgba(15, 130, 150, 0.22);
      outline-offset: 2px;
    }

    input[type="file"] {
      padding: 8px;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      margin-right: 12px;
      border: 1px solid rgba(15, 130, 150, 0.34);
      border-radius: 8px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.9), rgba(225, 247, 249, 0.66)),
        rgba(255, 255, 255, 0.62);
      color: #123044;
      padding: 8px 13px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 8px 20px rgba(15, 130, 150, 0.1);
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    input[type="file"]:hover::file-selector-button {
      border-color: rgba(15, 130, 150, 0.62);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.98), rgba(211, 244, 247, 0.82)),
        rgba(255, 255, 255, 0.76);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95), 0 12px 26px rgba(15, 130, 150, 0.16);
      transform: translateY(-1px);
    }

    .meta {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .action {
      width: 100%;
      display: grid;
      gap: 4px;
      align-items: center;
      min-height: 52px;
      border: 1px solid rgba(105, 124, 151, 0.22);
      border-radius: 8px;
      color: #172033;
      padding: 11px 13px;
      cursor: pointer;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76), 0 8px 22px rgba(23, 32, 51, 0.06);
      transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .action:nth-child(1) {
      background: linear-gradient(150deg, rgba(226, 247, 250, 0.78), rgba(255, 255, 255, 0.42));
      border-color: rgba(15, 130, 150, 0.2);
    }

    .action:nth-child(2) {
      background: linear-gradient(150deg, rgba(255, 240, 226, 0.82), rgba(255, 255, 255, 0.42));
      border-color: rgba(200, 110, 69, 0.2);
    }

    .action:nth-child(3) {
      background: linear-gradient(150deg, rgba(232, 248, 224, 0.82), rgba(255, 255, 255, 0.42));
      border-color: rgba(93, 139, 70, 0.2);
    }

    .action:nth-child(4) {
      background: linear-gradient(150deg, rgba(225, 238, 255, 0.82), rgba(255, 255, 255, 0.42));
      border-color: rgba(72, 112, 181, 0.2);
    }

    .action:nth-child(5) {
      background: linear-gradient(150deg, rgba(250, 229, 238, 0.82), rgba(255, 255, 255, 0.42));
      border-color: rgba(176, 82, 122, 0.2);
    }

    .action:hover {
      border-color: var(--brand);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.88), rgba(235, 251, 252, 0.56)),
        rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 14px 30px rgba(15, 130, 150, 0.16);
      transform: translateY(-1px);
    }

    .action:disabled {
      color: #8d9aab;
      cursor: not-allowed;
      opacity: 0.78;
      transform: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58);
      border-color: rgba(117, 137, 162, 0.18);
    }

    .action-title {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .action-desc {
      display: block;
      margin-top: 3px;
      color: #68778b;
      font-size: 12px;
      line-height: 1.35;
    }

    .workspace {
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .status {
      padding: 16px 18px;
      white-space: pre-wrap;
      min-height: 92px;
      line-height: 1.55;
      color: #273246;
      position: relative;
      z-index: 1;
    }

    .status.panel {
      background: linear-gradient(145deg, rgba(232, 249, 236, 0.56), rgba(255, 255, 255, 0.44));
      border-color: rgba(65, 148, 90, 0.2);
    }

    .status[data-kind="ok"] {
      border-color: rgba(24, 121, 78, .3);
    }

    .status[data-kind="warn"] {
      border-color: rgba(181, 71, 8, .35);
    }

    .preview {
      overflow: hidden;
      background: linear-gradient(145deg, rgba(232, 241, 255, 0.58), rgba(255, 255, 255, 0.44));
      border-color: rgba(77, 112, 178, 0.18);
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 1;
    }

    .preview-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .preview-note {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .table-wrap {
      max-height: 590px;
      overflow: auto;
      background: rgba(255, 255, 255, 0.36);
      position: relative;
      z-index: 1;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border: 1px solid #e5e9f1;
      padding: 8px 9px;
      text-align: left;
      vertical-align: top;
      max-width: 240px;
      overflow-wrap: anywhere;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(238, 246, 248, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: #26344a;
      font-weight: 700;
    }

    .empty {
      padding: 46px 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .topbar {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>Excel ETL 工具</h1>
        <p class="subtitle">匯入 Excel、選擇工作表，再執行需要的轉換並下載結果。</p>
      </div>
    </div>

    <div class="layout">
      <section class="panel controls" aria-label="ETL 控制區">
        <div class="field">
          <label for="fileInput">Excel 檔案</label>
          <div class="filebox">
            <input id="fileInput" type="file" accept=".xlsx,.xls,.xlsm,.csv">
            <div id="fileMeta" class="meta">尚未選擇檔案</div>
          </div>
        </div>

        <div class="field">
          <label for="sheetSelect">工作表</label>
          <select id="sheetSelect" disabled>
            <option value="">請先匯入檔案</option>
          </select>
        </div>

        <div class="field">
          <label>ETL 程式</label>
          <div class="actions">
            <button id="btnFilterCustomer" class="action" type="button" disabled>
              <span><span class="action-title">MOMO / PCHOME 銷貨單</span><span class="action-desc">篩選客戶並合併訂單品號</span></span>
            </button>
            <button id="btnVBAExport" class="action" type="button" disabled>
              <span><span class="action-title">輔翼轉 ERP 轉播單</span><span class="action-desc">依欄名轉成 ERP 轉播單格式</span></span>
            </button>
            <button id="btnMomoSpecial" class="action" type="button" disabled>
              <span><span class="action-title">Shopee / Yahoo 銷貨單</span><span class="action-desc">外站特殊格式與序號整理</span></span>
            </button>
            <button id="btnOMSExport" class="action" type="button" disabled>
              <span><span class="action-title">銷貨格式轉 OMS</span><span class="action-desc">轉出 OMS 匯入欄位格式</span></span>
            </button>
            <button id="btnRemoveTop5" class="action" type="button" disabled>
              <span><span class="action-title">清理所有工作表</span><span class="action-desc">刪除前 6 列、過濾列與欄位</span></span>
            </button>
          </div>
        </div>
      </section>

      <section class="workspace">
        <div id="log" class="panel status">請先選擇 Excel 檔案。</div>
        <section class="panel preview" aria-label="工作表預覽">
          <div class="preview-head">
            <h2 class="preview-title">資料預覽</h2>
            <span id="previewNote" class="preview-note">最多顯示前 30 列、20 欄</span>
          </div>
          <div id="preview" class="table-wrap">
            <div class="empty">尚無資料可預覽</div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const sheetSelect = document.getElementById("sheetSelect");
    const fileMeta = document.getElementById("fileMeta");
    const logBox = document.getElementById("log");
    const preview = document.getElementById("preview");
    const previewNote = document.getElementById("previewNote");

    const btnFilterCustomer = document.getElementById("btnFilterCustomer");
    const btnVBAExport = document.getElementById("btnVBAExport");
    const btnMomoSpecial = document.getElementById("btnMomoSpecial");
    const btnOMSExport = document.getElementById("btnOMSExport");
    const btnRemoveTop5 = document.getElementById("btnRemoveTop5");
    const actionButtons = [btnFilterCustomer, btnVBAExport, btnMomoSpecial, btnOMSExport, btnRemoveTop5];

    let workbook = null;
    let originalFileName = "";

    function val(row, idx) {
      const v = row && row[idx];
      return v === undefined || v === null ? "" : String(v).trim();
    }

    function getBaseName(fileName) {
      return String(fileName || "輸出").replace(/\.[^/.]+$/, "");
    }

    function setLog(message, kind) {
      logBox.textContent = message;
      logBox.dataset.kind = kind || "";
    }

    function setReadyState(ready) {
      sheetSelect.disabled = !ready;
      actionButtons.forEach(button => {
        button.disabled = !ready;
      });
    }

    function getSelectedSheet() {
      if (!workbook) {
        setLog("尚未載入檔案。", "warn");
        return null;
      }
      const sheetName = sheetSelect.value;
      if (!sheetName || !workbook.Sheets[sheetName]) {
        setLog("請先選擇工作表。", "warn");
        return null;
      }
      return { sheetName, sheet: workbook.Sheets[sheetName] };
    }

    function renderPreview() {
      const sel = getSelectedSheet();
      if (!sel) {
        preview.innerHTML = '<div class="empty">尚無資料可預覽</div>';
        return;
      }

      const rows = XLSX.utils.sheet_to_json(sel.sheet, { header: 1, raw: false, defval: "" });
      if (!rows.length) {
        preview.innerHTML = '<div class="empty">這個工作表沒有資料</div>';
        previewNote.textContent = sel.sheetName;
        return;
      }

      const maxRows = Math.min(rows.length, 30);
      const maxCols = Math.min(Math.max(...rows.slice(0, maxRows).map(row => row.length), 0), 20);
      let html = "<table><thead><tr>";
      for (let c = 0; c < maxCols; c++) {
        html += `<th>${escapeHtml(columnName(c))}</th>`;
      }
      html += "</tr></thead><tbody>";
      for (let r = 0; r < maxRows; r++) {
        html += "<tr>";
        for (let c = 0; c < maxCols; c++) {
          html += `<td>${escapeHtml(rows[r][c] || "")}</td>`;
        }
        html += "</tr>";
      }
      html += "</tbody></table>";
      preview.innerHTML = html;
      previewNote.textContent = `${sel.sheetName}，共 ${rows.length} 列`;
    }

    function columnName(index) {
      let n = index + 1;
      let name = "";
      while (n > 0) {
        const mod = (n - 1) % 26;
        name = String.fromCharCode(65 + mod) + name;
        n = Math.floor((n - mod) / 26);
      }
      return name;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    fileInput.addEventListener("change", function () {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      originalFileName = file.name;
      setLog("讀取 Excel 檔案中…");
      setReadyState(false);
      sheetSelect.innerHTML = '<option value="">讀取中</option>';
      fileMeta.textContent = `${file.name} (${Math.round(file.size / 1024).toLocaleString()} KB)`;

      const reader = new FileReader();
      reader.onload = function (event) {
        try {
          const data = new Uint8Array(event.target.result);
          workbook = XLSX.read(data, { type: "array", cellDates: true });
          if (!workbook.SheetNames.length) {
            workbook = null;
            sheetSelect.innerHTML = '<option value="">沒有工作表</option>';
            setLog("檔案內沒有可用工作表。", "warn");
            return;
          }

          sheetSelect.innerHTML = "";
          workbook.SheetNames.forEach(function (sheetName) {
            const option = document.createElement("option");
            option.value = sheetName;
            option.textContent = sheetName;
            sheetSelect.appendChild(option);
          });

          setReadyState(true);
          setLog(`已載入 ${file.name}\n請選擇工作表與要執行的 ETL 程式。`, "ok");
          renderPreview();
        } catch (err) {
          console.error(err);
          workbook = null;
          setReadyState(false);
          sheetSelect.innerHTML = '<option value="">讀取失敗</option>';
          setLog("讀取檔案失敗：" + err.message, "warn");
        }
      };
      reader.readAsArrayBuffer(file);
    });

    sheetSelect.addEventListener("change", renderPreview);

    btnFilterCustomer.addEventListener("click", function () {
      const sel = getSelectedSheet();
      if (!sel) return;
      const { sheet } = sel;

      setLog("功能一（MOMO 銷貨單 + 合併）處理中…");

      try {
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
        if (!rows || rows.length <= 1) {
          setLog("來源資料不足。", "warn");
          return;
        }

        const data = rows.slice(1);
        const headers = [
          "銷貨日期", "客戶代號(固定)", "部門代號(固定)", "通路訂單編號",
          "備註", "品號", "數量", "金額", "通路訂單序號(不填)",
          "庫別", "發票地址一(固定)", "客戶全名(固定)"
        ];

        let momo = [];
        momo.push(headers);
        let momoCount = 0;

        data.forEach(row => {
          const 客戶代號 = val(row, 16);

          const isMomo = (客戶代號 === "27365925" || 客戶代號 === "27365925DS");
          const isNew  = (客戶代號 === "16606102");

          if (isMomo || isNew) {
            const 通路訂單編號 = isNew ? val(row, 4) : val(row, 11);

            momo.push([
              "",
              客戶代號,
              val(row, 17),
              通路訂單編號,
              val(row, 3),
              val(row, 9),
              val(row, 13),
              val(row, 15),
              "",
              val(row, 20),
              val(row, 19),
              val(row, 18)
            ]);
            momoCount++;
          }
        });

        let merged = [];
        merged.push(headers);

        let dict = {};

        for (let i = 1; i < momo.length; i++) {
          const row = momo[i];
          const 通路訂單編號 = row[3];
          const 品號 = row[5];
          const key = 通路訂單編號 + "||" + 品號;

          if (!dict[key]) {
            dict[key] = merged.length;
            merged.push([...row]);
          } else {
            const idx = dict[key];
            const oldQty = Number(merged[idx][6] || 0);
            const newQty = Number(row[6] || 0);
            merged[idx][6] = oldQty + newQty;

            const oldAmt = Number(merged[idx][7] || 0);
            const newAmt = Number(row[7] || 0);
            merged[idx][7] = oldAmt + newAmt;
          }
        }

        const mergedCount = merged.length - 1;

        const outWb = XLSX.utils.book_new();
        const mergedSheet = XLSX.utils.aoa_to_sheet(merged);

        XLSX.utils.book_append_sheet(outWb, mergedSheet, "合併後資料");

        const outName = "MOMO&PCHOME銷貨單" + getBaseName(originalFileName) + ".xlsx";
        XLSX.writeFile(outWb, outName);

        setLog(
          "MOMO銷貨單完成！\n" +
          "原始篩選資料：" + momoCount + " 筆\n" +
          "銷貨單資料：" + mergedCount + " 筆\n" +
          "已下載：" + outName,
          "ok"
        );

      } catch (err) {
        console.error(err);
        setLog("功能一發生錯誤：" + err.message, "warn");
      }
    });

    btnVBAExport.addEventListener("click", function () {
      const sel = getSelectedSheet();
      if (!sel) return;
      const { sheet } = sel;

      setLog("功能二（轉播單）處理中…");

      try {
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
        if (!rows || rows.length <= 1) {
          setLog("來源資料不足，無法轉換。", "warn");
          return;
        }

        const header = rows[0];
        const data = rows.slice(1);
        const n = data.length;

        function findCol(keyword) {
          keyword = keyword.replace(/ /g, "");
          for (let i = 0; i < header.length; i++) {
            const h = String(header[i] || "").replace(/[\n ]/g, "");
            if (h.includes(keyword)) return i + 1;
          }
          return 0;
        }

        const c撥出日期 = findCol("撥出日期");
        const c單號 = findCol("單號");
        const c撥出倉庫 = findCol("撥出倉庫");
        const c撥入倉庫 = findCol("撥入倉庫");
        const c商品代號 = findCol("商品代號");
        const c商品名稱 = findCol("商品名稱");
        const c撥出數量 = findCol("撥出數量");

        const required = [
          ["撥出日期", c撥出日期],
          ["單號", c單號],
          ["撥出倉庫", c撥出倉庫],
          ["撥入倉庫", c撥入倉庫],
          ["商品代號", c商品代號],
          ["商品名稱", c商品名稱],
          ["撥出數量", c撥出數量]
        ];
        for (const [name, col] of required) {
          if (col === 0) {
            setLog("來源缺少必要欄位：「" + name + "」", "warn");
            return;
          }
        }

        const COL = {
          單別: 2,
          單號: 3,
          部門代號: 5,
          備註: 6,
          廠別代號: 9,
          單據日期: 15,
          確認者: 16,
          簽核狀態碼: 18,
          運輸方式: 21,
          BN單別: 66,
          BP序號: 68,
          品號: 69,
          品名: 70,
          數量: 72,
          單位: 73,
          轉出庫: 78,
          轉入庫: 79
        };
        const maxCol = 79;
        const aoa = [];
        const title = new Array(maxCol).fill("");

        title[COL.單別 - 1] = "單別";
        title[COL.單號 - 1] = "單號";
        title[COL.部門代號 - 1] = "部門代號";
        title[COL.備註 - 1] = "備註";
        title[COL.廠別代號 - 1] = "廠別代號";
        title[COL.單據日期 - 1] = "單據日期";
        title[COL.確認者 - 1] = "確認者";
        title[COL.簽核狀態碼 - 1] = "簽核狀態碼";
        title[COL.運輸方式 - 1] = "運輸方式";
        title[COL.BN單別 - 1] = "單別";
        title[COL.BP序號 - 1] = "序號";
        title[COL.品號 - 1] = "品號";
        title[COL.品名 - 1] = "品名";
        title[COL.數量 - 1] = "數量";
        title[COL.單位 - 1] = "單位";
        title[COL.轉出庫 - 1] = "轉出庫";
        title[COL.轉入庫 - 1] = "轉入庫";

        aoa.push(title);

        let serial = 1;
        for (let i = 0; i < n; i++) {
          const row = data[i];
          if (!val(row, c商品代號 - 1)) continue;

          const newRow = new Array(maxCol).fill("");

          newRow[COL.單別 - 1] = "122";
          newRow[COL.部門代號 - 1] = "6999";
          newRow[COL.廠別代號 - 1] = "001";
          newRow[COL.確認者 - 1] = "E11075";
          newRow[COL.簽核狀態碼 - 1] = "N";
          newRow[COL.運輸方式 - 1] = "5";

          newRow[COL.單據日期 - 1] = data[i][c撥出日期 - 1];
          newRow[COL.備註 - 1] = data[i][c單號 - 1];
          newRow[COL.品號 - 1] = data[i][c商品代號 - 1];
          newRow[COL.品名 - 1] = data[i][c商品名稱 - 1];
          newRow[COL.數量 - 1] = data[i][c撥出數量 - 1];
          newRow[COL.轉出庫 - 1] = data[i][c撥出倉庫 - 1];
          newRow[COL.轉入庫 - 1] = data[i][c撥入倉庫 - 1];

          newRow[COL.BN單別 - 1] = "122";
          newRow[COL.BP序號 - 1] = serial++;

          aoa.push(newRow);
        }

        const outSheet = XLSX.utils.aoa_to_sheet(aoa);
        const outWb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(outWb, outSheet, "轉播單");

        const outName = "轉播單_" + getBaseName(originalFileName) + ".xlsx";
        XLSX.writeFile(outWb, outName);

        setLog(
          "轉播單轉換完成！\n" +
          "已下載：" + outName + "\n" +
          "總筆數：" + (aoa.length - 1),
          "ok"
        );
      } catch (err) {
        console.error(err);
        setLog("轉播單轉換發生錯誤：" + err.message, "warn");
      }
    });

    btnMomoSpecial.addEventListener("click", function () {
      const sel = getSelectedSheet();
      if (!sel) return;
      const { sheet } = sel;

      setLog("功能三（外站特殊格式）處理中…");

      try {
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
        if (!rows || rows.length <= 1) {
          setLog("來源資料不足。", "warn");
          return;
        }

        const data = rows.slice(1);
        const targetCustomers = ["56801904A", "56801904D", "27240313A", "54880333", "53048094"];

        let tempRows = data
          .filter(r => targetCustomers.includes(val(r, 16)))
          .map(r => {
            const cust = val(r, 16);
            const useE = ["56801904A", "56801904D", "54880333", "53048094"].includes(cust);
            const orderNo = useE ? val(r, 4) : val(r, 11);

            let pn = val(r, 9);
            if (pn === "seller_discount") pn = "100004-000-000";
            if (pn === "SHIPFEE") pn = "100001-000-000";
            if (["platform_coin", "Discount"].includes(pn)) return null;

            return {
              銷貨日期: "",
              客戶代號: cust,
              部門代號: val(r, 17),
              通路訂單編號: orderNo,
              備註: val(r, 3),
              品號: pn,
              數量: (pn === "100004-000-000" || pn === "100001-000-000") ? 0 : val(r, 13),
              金額: val(r, 15),
              庫別: val(r, 20),
              發票地址: val(r, 19),
              客戶全名: val(r, 18),
              序號: 0
            };
          })
          .filter(Boolean);

        const groups = {};
        tempRows.forEach(r => {
          const key = r.通路訂單編號 + "|||" + r.備註;
          if (!groups[key]) groups[key] = 0;
          groups[key]++;
          r.序號 = groups[key];
        });

        tempRows.sort((a, b) => {
          if (a.通路訂單編號 < b.通路訂單編號) return -1;
          if (a.通路訂單編號 > b.通路訂單編號) return 1;
          return a.序號 - b.序號;
        });

        const out = [];
        out.push([
          "銷貨日期", "客戶代號(固定)", "部門代號(固定)", "通路訂單編號",
          "備註", "品號", "數量", "金額", "通路訂單序號(要填)",
          "庫別", "發票地址一(固定)", "客戶全名(固定)"
        ]);

        tempRows.forEach(r => {
          out.push([
            "",
            r.客戶代號,
            r.部門代號,
            r.通路訂單編號,
            r.備註,
            r.品號,
            r.數量,
            r.金額,
            r.序號,
            r.庫別,
            r.發票地址,
            r.客戶全名
          ]);
        });

        const outSheet = XLSX.utils.aoa_to_sheet(out);
        const outWb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(outWb, outSheet, "外站轉檔");

        const outName = "SHOPEE&YAHOO銷貨單" + getBaseName(originalFileName) + ".xlsx";
        XLSX.writeFile(outWb, outName);

        setLog(
          "SHOPEE&YAHOO&迪卡農轉檔完成！\n" +
          "已下載：" + outName + "\n" +
          "總筆數：" + tempRows.length,
          "ok"
        );
      } catch (err) {
        console.error(err);
        setLog("SHOPEE&YAHOO&迪卡農轉檔發生錯誤：" + err.message, "warn");
      }
    });

    btnOMSExport.addEventListener("click", function () {
      const sel = getSelectedSheet();
      if (!sel) return;
      const { sheet } = sel;

      setLog("功能四（匯入格式 → OMS）處理中…");

      try {
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });
        if (rows.length < 3) {
          setLog("來源資料太少，無法轉換。", "warn");
          return;
        }

        function findCol(keyword) {
          for (let r = 0; r < 10 && r < rows.length; r++) {
            const row = rows[r];
            for (let c = 0; c < row.length; c++) {
              if (row[c] && row[c].toString().includes(keyword)) {
                return c + 1;
              }
            }
          }
          return 0;
        }

        function dateToYYYYMMDD(v) {
          if (!v) return "";
          if (!isNaN(Date.parse(v))) {
            const d = new Date(v);
            return (
              d.getFullYear() +
              String(d.getMonth() + 1).padStart(2, "0") +
              String(d.getDate()).padStart(2, "0")
            );
          }
          const digits = v.toString().replace(/\D/g, "");
          return digits.length >= 8 ? digits.slice(0, 8) : digits;
        }

        function lastDataRow(colIndexes) {
          let last = 0;
          colIndexes.forEach(col => {
            if (!col) return;
            for (let r = rows.length - 1; r >= 0; r--) {
              const v = rows[r][col - 1];
              if (v !== "" && v !== undefined && v !== null) {
                last = Math.max(last, r + 1);
                break;
              }
            }
          });
          return last;
        }

        const col品名 = findCol("品名");
        const col品號 = findCol("品號");
        const col數量 = findCol("訂單數量");
        const col單價 = findCol("單價");
        const col金額 = findCol("金額");

        const col單號 = findCol("單號");
        const col序號 = findCol("序號");
        const col單別 = findCol("單別");
        const col單據日期 = findCol("單據日期") || findCol("訂單日期");

        const col賣場編號 = findCol("賣場編號");
        const col收件人姓名 = findCol("收件人姓名");
        const col收件人電話 = findCol("收件人電話");
        const col收件人地址 = findCol("收件人地址");

        if (!col品名 || !col品號 || !col數量 || !col單價 || !col金額) {
          setLog("找不到必要欄位：品名 / 品號 / 訂單數量 / 單價 / 金額", "warn");
          return;
        }

        const lastRow = lastDataRow([
          col品名, col品號, col數量, col單價, col金額
        ]);

        if (lastRow < 3) {
          setLog("來源資料不足，無法轉換。", "warn");
          return;
        }

        const omsHeaders = [
          "賣場訂單編號","賣場編號","訂購人姓名","收件人姓名","訂購人電話","收件人電話",
          "收件人郵遞區號","收件人地址","訂單成立日","商品名稱","商品貨號","實售價格",
          "商品單價","購買量","訂單總金額","代收款","訂單備註","付款方式","配送方式","規格",
          "交易序號","超商門市代碼","超商名稱","配送編號","收件國家","收件省分","收件城市",
          "群品","批號","儲位","效期","上架日","季節"
        ];

        const out = [];
        out.push(omsHeaders);

        const dictLine = {};
        let outRow = 2;

        for (let r = 3; r <= lastRow; r++) {
          const row = rows[r - 1];

          const 品名 = row[col品名 - 1];
          const 品號 = row[col品號 - 1];
          const 數量 = row[col數量 - 1];

          if (!品名 && !品號 && !數量) continue;

          const output = new Array(omsHeaders.length).fill("");

          output[9]  = 品名;
          output[10] = 品號;

          if (col賣場編號)    output[1] = row[col賣場編號 - 1];
          if (col收件人姓名)  output[2] = row[col收件人姓名 - 1];
          if (col收件人姓名)  output[3] = row[col收件人姓名 - 1];
          if (col收件人電話)  output[4] = row[col收件人電話 - 1];
          if (col收件人電話)  output[5] = row[col收件人電話 - 1];
          if (col收件人地址)  output[7] = row[col收件人地址 - 1];

          output[11] = 0;
          output[12] = "";
          output[13] = 數量;
          output[14] = 0;

          let seq = "";
          const raw序號 = col序號 ? row[col序號 - 1] : "";
          const raw單號 = col單號 ? row[col單號 - 1] : "";

          if (raw序號) seq = raw序號;
          else if (raw單號) seq = raw單號;
          else {
            const key = raw單號 || "";
            dictLine[key] = (dictLine[key] || 0) + 1;
            seq = dictLine[key];
          }
          output[20] = seq;

          const prefix = col單別 ? row[col單別 - 1] : "";
          const dt = col單據日期 ? dateToYYYYMMDD(row[col單據日期 - 1]) : "";
          const fullKey = `${prefix}${dt}${seq}`;
          output[0] = fullKey;

          output[18] = "99";
          output[19] = "104";

          out.push(output);
          outRow++;
        }

        const outSheet = XLSX.utils.aoa_to_sheet(out);
        const outWb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(outWb, outSheet, "轉出OMS格式");

        const outName = "OMS轉出格式_" + getBaseName(originalFileName) + ".xlsx";
        XLSX.writeFile(outWb, outName);

        setLog(
          "銷貨格式轉OMS格式完成！\n" +
          "共輸出 " + (outRow - 2) + " 筆資料。\n" +
          "已下載：" + outName,
          "ok"
        );
      } catch (err) {
        console.error(err);
        setLog("功能四發生錯誤：" + err.message, "warn");
      }
    });

    btnRemoveTop5.addEventListener("click", function () {
      if (!workbook) {
        setLog("尚未載入檔案", "warn");
        return;
      }

      setLog("刪除所有工作表前 5 列並過濾指定列處理中…");

      try {
        const outWb = XLSX.utils.book_new();

        workbook.SheetNames.forEach(sheetName => {
          const sheet = workbook.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

          if (!rows || rows.length === 0) {
            const emptySheet = XLSX.utils.aoa_to_sheet([]);
            XLSX.utils.book_append_sheet(outWb, emptySheet, sheetName);
            return;
          }

          let newRows = rows.slice(5);

          newRows = newRows.filter(row => {
            const colA = row[0] !== undefined && row[0] !== null ? String(row[0]).trim() : "";
            const colS = row[18] !== undefined && row[18] !== null ? String(row[18]).trim() : "";

            const removeAValues = [
              "銷售員小計：",
              "現金：",
              "信用卡：",
              "有價券類：",
              "其他：",
              "補登金額："
            ];

            if (removeAValues.includes(colA)) return false;
            if (colS === "尾款") return false;

            return true;
          });

          newRows = newRows.map(row => {
            if (row[14] !== undefined && row[14] !== "") {
              const num = Number(String(row[14]).replace(/,/g, ""));
              row[14] = isNaN(num) ? row[14] : num;
            }

            if (row[15] !== undefined && row[15] !== "") {
              const num = Number(String(row[15]).replace(/,/g, ""));
              row[15] = isNaN(num) ? row[15] : num;
            }

            return row;
          });

          newRows = newRows.map(row => {
            return row.filter((cell, idx) => {
              const removeIndexes = [1, 3, 4, 5, 6, 7, 8, 12, 13, 17];
              return !removeIndexes.includes(idx);
            });
          });

          const safeSheetName = sheetName.slice(0, 31) || "Sheet";
          const newSheet = XLSX.utils.aoa_to_sheet(newRows);
          XLSX.utils.book_append_sheet(outWb, newSheet, safeSheetName);
        });

        const outName = "過濾後_" + getBaseName(originalFileName) + ".xlsx";
        XLSX.writeFile(outWb, outName);

        setLog(
          "處理完成！\n" +
          "已刪除每個工作表前 5 列\n" +
          "已刪除 A 欄為指定小計或付款文字的列\n" +
          "已刪除 S 欄為「尾款」的列\n" +
          "已下載：" + outName,
          "ok"
        );
      } catch (err) {
        console.error(err);
        setLog("刪除前列發生錯誤：" + err.message, "warn");
      }
    });
  </script>
